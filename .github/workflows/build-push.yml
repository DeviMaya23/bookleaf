name: Build and Push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/258487485284/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ci-github@bookleaf-393.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: australia-southeast1-docker.pkg.dev/bookleaf-393/bookleaf/backend:latest
